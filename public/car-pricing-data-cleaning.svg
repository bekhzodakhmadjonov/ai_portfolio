<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Car pricing prediction data cleaning</title>
  <desc id="desc">A stylized car silhouette with an upward green trend arrow representing cleaned automotive pricing data.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#5fb7ff"/>
      <stop offset="0.48" stop-color="#92f1ec"/>
      <stop offset="1" stop-color="#56a6ff"/>
    </linearGradient>
    <linearGradient id="car" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4fbff"/>
      <stop offset="0.55" stop-color="#b8d9dd"/>
      <stop offset="1" stop-color="#8eb1bd"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0" stop-color="#13cc38"/>
      <stop offset="1" stop-color="#52ff4f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1163b6" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="980" height="520" fill="url(#sky)"/>
  <ellipse cx="486" cy="454" rx="430" ry="46" fill="#267bd3" opacity="0.18"/>

  <g filter="url(#shadow)">
    <path d="M88 336 L176 183 C247 72 357 38 495 64 C623 88 716 184 796 335 Z" fill="url(#car)"/>
    <path d="M198 214 C251 126 338 89 485 90 L484 215 Z" fill="#80eef2" opacity="0.72" stroke="#426b86" stroke-width="9"/>
    <path d="M508 91 C615 105 691 158 749 216 L508 216 Z" fill="#80eef2" opacity="0.72" stroke="#426b86" stroke-width="9"/>
    <path d="M88 336 H312 L324 338 L327 337 H607 L620 338 L621 336 H796 L753 258 C705 232 647 231 603 260 C573 280 554 307 547 336 H352 C343 304 321 276 289 257 C244 230 188 235 146 263 Z" fill="url(#car)"/>
    <circle cx="246" cy="365" r="68" fill="#243447"/>
    <circle cx="246" cy="365" r="52" fill="#c8d9e1"/>
    <circle cx="665" cy="365" r="68" fill="#243447"/>
    <circle cx="665" cy="365" r="52" fill="#c8d9e1"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M78 457 L269 302 L319 351 L473 228 L513 274 L642 118 L686 160 L872 0" fill="none" stroke="#0d982f" stroke-width="35" stroke-linejoin="miter"/>
    <path d="M78 438 L269 283 L319 332 L473 209 L513 255 L642 99 L686 141 L872 -19" fill="none" stroke="url(#green)" stroke-width="35" stroke-linejoin="miter"/>
    <path d="M777 43 L939 -32 L874 132 L850 71 Z" fill="#0d982f"/>
    <path d="M777 24 L939 -51 L874 113 L850 52 Z" fill="url(#green)"/>
  </g>
</svg>
